name: Build Windows EXE and publish Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag della release (es: v0.1.0). Se vuoto: usa il tag dell'evento o crea manual-..."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine release tag
        id: rel
        shell: pwsh
        run: |
          $tag = ""

          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.tag_name }}" -ne "") {
              $tag = "${{ inputs.tag_name }}"
            } else {
              $tag = "manual-$((Get-Date).ToString('yyyyMMdd-HHmmss'))"
            }
          }

          if ($tag -eq "") { throw "Tag non determinato (evento: ${{ github.event_name }})" }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Using tag: $tag"

      - name: Pre-build diagnostics (core module presence)
        shell: pwsh
        run: |
          Write-Host "Listing maps3d_app\core"
          Get-ChildItem -Force maps3d_app\core | Format-Table -AutoSize

          Write-Host "--- maps3d_app\core\__init__.py ---"
          if (Test-Path "maps3d_app\core\__init__.py") {
            Get-Content "maps3d_app\core\__init__.py"
          } else {
            Write-Host "__init__.py not found"
          }

          Write-Host "Test-Path maps3d_app\core\blender_backend.py"
          Test-Path "maps3d_app\core\blender_backend.py"

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Maps3DGen_NEW `
            --paths . `
            --collect-submodules maps3d_app `
            --collect-submodules maps3d_app.core `
            --hidden-import maps3d_app.core.blender_backend `
            --collect-all rasterio `
            --collect-all pyproj `
            --collect-all shapely `
            --add-data "maps3d_app/engine/blender_script.py;maps3d_app/engine" `
            launcher.py

          if (!(Test-Path "dist\Maps3DGen_NEW.exe")) { throw "EXE not found in dist\Maps3DGen_NEW.exe" }

      - name: Smoke check PyInstaller payload (backend Blender + script)
        shell: pwsh
        run: |
          $archive = pyi-archive_viewer -r dist\Maps3DGen_NEW.exe | Out-String
          $archive | Out-File -FilePath dist\pyi-archive.txt -Encoding utf8

          $backendPatterns = @(
            'maps3d_app\.core\.blender_backend',
            'maps3d_app/core/blender_backend\.pyc',
            'maps3d_app\\core\\blender_backend\.pyc',
            'blender_backend'
          )
          $scriptPatterns = @(
            'maps3d_app/engine/blender_script\.py',
            'maps3d_app\\engine\\blender_script\.py',
            'blender_script\.py',
            'blender_script'
          )

          $hasBackend = $false
          foreach ($p in $backendPatterns) {
            if ($archive -match $p) {
              Write-Host "Matched backend pattern: $p"
              $hasBackend = $true
              break
            }
          }

          $hasScript = $false
          foreach ($p in $scriptPatterns) {
            if ($archive -match $p) {
              Write-Host "Matched script pattern: $p"
              $hasScript = $true
              break
            }
          }

          if (-not $hasBackend -or -not $hasScript) {
            Write-Host '--- Candidate lines (blender_backend|blender_script|maps3d_app|PYZ) ---'
            $archive -split "`r?`n" |
              Select-String -Pattern 'blender_backend|blender_script|maps3d_app|PYZ' |
              ForEach-Object { Write-Host $_.Line }
          }

          if (-not $hasBackend) {
            throw "PyInstaller payload missing blender backend (checked: $($backendPatterns -join ', '))"
          }

          if (-not $hasScript) {
            throw "PyInstaller payload missing blender script (checked: $($scriptPatterns -join ', '))"
          }

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maps3DGen-Windows
          path: dist/Maps3DGen_NEW.exe

      - name: Check GitHub CLI availability
        shell: pwsh
        run: gh --version

      - name: Publish EXE to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.rel.outputs.tag }}"
          $asset = "dist/Maps3DGen_NEW.exe"

          gh release view $tag --repo $repo | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Release for tag '$tag' not found, creating it"
            gh release create $tag $asset --repo $repo --title $tag --notes "Automated build" --latest
          } else {
            Write-Host "Release for tag '$tag' found, uploading asset"
            gh release upload $tag $asset --repo $repo --clobber
          }
