      - name: Smoke check PyInstaller payload (backend Blender + script)
        shell: pwsh
        run: |
          $archive = pyi-archive_viewer -r dist\Maps3DGen_NEW.exe | Out-String
          $archive | Out-File -FilePath dist\pyi-archive.txt -Encoding utf8

          $backendPatterns = @(
            "maps3d_app\.core\.blender_backend",
            "maps3d_app/core/blender_backend.pyc",
            "maps3d_app\core\blender_backend.pyc",
            "blender_backend"
          )
          $scriptPatterns = @(
            "maps3d_app/engine/blender_script.py",
            "maps3d_app\engine\blender_script.py",
            "blender_script.py",
            "blender_script"
          )

          $hasBackend = $false
          foreach ($p in $backendPatterns) {
            if ($archive -match $p) {
              Write-Host "Matched backend pattern: $p"
              $hasBackend = $true
              break
            }
          }

          $hasScript = $false
          foreach ($p in $scriptPatterns) {
            if ($archive -match [regex]::Escape($p)) {
              Write-Host "Matched script pattern: $p"
              $hasScript = $true
              break
            }
          }

          if (-not $hasBackend -or -not $hasScript) {
            Write-Host "--- Candidate lines (blender_backend|blender_script|maps3d_app|PYZ) ---"
            $archive -split "`r?`n" |
              Select-String -Pattern "blender_backend|blender_script|maps3d_app|PYZ" |
              ForEach-Object { Write-Host $_.Line }
          }

          if (-not $hasBackend) {
            throw "PyInstaller payload missing blender backend (checked: $($backendPatterns -join ', '))"
          }

          if (-not $hasScript) {
            throw "PyInstaller payload missing blender script (checked: $($scriptPatterns -join ', '))"
          }
