name: Build Windows EXE and publish Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag della release (es: v0.1.0). Se vuoto: usa il tag dell'evento o crea manual-..."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine release tag
        id: rel
        shell: pwsh
        run: |
          $tag = ""

          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.tag_name }}" -ne "") {
              $tag = "${{ inputs.tag_name }}"
            } else {
              $tag = "manual-$((Get-Date).ToString('yyyyMMdd-HHmmss'))"
            }
          }

          if ($tag -eq "") { throw "Tag non determinato (evento: ${{ github.event_name }})" }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Using tag: $tag"

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Maps3DGen `
            launcher.py `
            --collect-submodules maps3d_app `
            --hidden-import maps3d_app.core.blender_backend `
            --collect-all rasterio `
            --collect-all pyproj `
            --collect-all shapely `
            --add-data "maps3d_app/engine/blender_script.py;maps3d_app/engine"

          if (!(Test-Path "dist\Maps3DGen.exe")) { throw "EXE not found in dist\Maps3DGen.exe" }

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maps3DGen-Windows
          path: dist/Maps3DGen.exe

      - name: Create GitHub Release (if missing)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.rel.outputs.tag }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build"
          }

      - name: Upload EXE to GitHub Release (gh cli)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.rel.outputs.tag }}"
          gh release upload $tag dist/Maps3DGen.exe --clobber
